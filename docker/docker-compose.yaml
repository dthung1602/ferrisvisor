services:
  dev_host1:
    build:
      context: .
    ports:
      - "9001:9001"
    volumes:
      - type: bind
        target: /etc/supervisor.d/host1.ini
        source: supervisor.d/host1.ini
    entrypoint: ["/entrypoint.sh"]
    command: ["tail", "-f", "/dev/null"]
  dev_host2:
    build:
      context: .
    ports:
      - "9002:9001"
    volumes:
      - type: bind
        target: /etc/supervisor.d/host2.ini
        source: supervisor.d/host2.ini
    entrypoint: [ "/entrypoint.sh" ]
    command: [ "tail", "-f", "/dev/null" ]
